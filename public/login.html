<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — AI Mua sắm công</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/logo-hainam.png" type="image/png" />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-card__brand">
          <img src="/logo-hainam.png" alt="HAINAM GLOBAL" class="login-card__logo" />
          <p class="login-card__org">Hệ thống theo dõi đấu thầu nội bộ</p>
          <h1>Đăng nhập</h1>
          <p class="login-card__desc">Nhập tài khoản và mật khẩu để truy cập AI Mua sắm công</p>
        </div>

        <form id="loginForm" class="login-form">
          <label class="login-field">
            <span>Tài khoản</span>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Nhập tên đăng nhập"
              required
            />
          </label>
          <label class="login-field">
            <span>Mật khẩu</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Nhập mật khẩu"
              required
            />
          </label>
          <p id="loginError" class="login-error" hidden></p>
          <button id="loginBtn" class="btn btn--primary btn--block" type="submit">
            Đăng nhập
          </button>
        </form>
      </div>
    </div>

    <script src="/login.js" type="module"></script>
  </body>
</html>
